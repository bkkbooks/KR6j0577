body:
  text: 西天北印度烏填曩國帝釋宮寺三藏傳法大師賜紫沙門臣施護奉詔譯如是我聞一時佛在殑伽河邊與大眾俱及於護世四大天王多聞天王最為上首爾時世尊告四王言有大怖畏深可厭患汝等應知若男若女童男童女若人若天我觀中夭生大怖畏恒時擾惱各不相救乃至老死甚大怖畏而無窮盡吾今為汝說救護法即時會中四大天王而白佛言世尊我等今日於世尊前聞此說已踴躍歡喜以身命財奉於如來願佛哀愍為我演說爾時世尊一彈指間面東而住說如是言南無十方一切如來無上正等正覺廣大慈悲憐愍有情彼皆證得阿耨多羅三藐三菩提惟願慈悲同共觀察著我有情與力加護息除中夭敷演解說如是東西南北乃至上下一切如來唱如是言南無一切如來無上正等正覺不捨慈悲而為眾生證得阿耨多羅三藐三菩提惟願慈悲同共觀察著我有情敷演解說爾時諸佛同共證明我今宣說救護怖畏息除難法如是乃至第二法輪演說之時此會眾中皆獲壽命色相具足悉得離於生死怖畏而無中夭乃至老病亦復如是爾時十方一切諸佛照見一一世界如來形像如胡麻量遍滿一切又彼十方一一如來同共發聲乃說呪曰怛儞也二合他去引一左禮左攞引左禮二尾𩕳跓傑固反娑嚩二合悉底二合計三作訖㘓二合引囉引爾曩四鉢囉二合捨滿覩五薩嚩枲誐引入六阿曩矩曩注准上切七左㘑左㘑八計麼𩕳設焰二合九儞麼儞設也二合十儞呬麼詩悉十一嬌居夭反引囉尾曳二合十二呬矩囉㘑十三矩麼底十四尾灑麼引抳麼抳十五尸數醯嚩十六阿左禮尾左禮十七麼引尾覽嚩十八母護母轉舌護十九娑嚩二合引賀二十爾時十方一切如來說此祕密神呪已作如是言一切如來無上正等正覺皆同此說爾時北方多聞天王而白佛言世尊我今聞彼十方如來威神之力加持擁護而無中夭息除怖畏面於佛前而說呪曰怛儞也二合一他去引濕吠二合去帝二濕吠二合去帝三里里里里四爾時東方持國天王即於佛前乃說呪曰拶哩拶哩娑嚩二合引賀引爾時南方增長天王在於佛前即說呪曰嚩去引梨嚩嚩嚩嚩爾時西方廣目天王侍立佛前亦說呪曰麼去引鄧擬儞蘇麼引蘇母蘇母爾時世尊告四天王言今此神呪是一切佛證明觀察若有族姓男女等輩晝夜受持志誠憶念必獲長命而無中夭命終之後不墮惡趣若復有人利益有情發誠諦心受持讀誦臨命終時無諸怖畏亦無變怪及諸惡相於現在世又無白癩顛狂諸病及離水火刀兵疾疫蟲藥等毒乃至雷雹一切諸難皆悉遠離若是經典所在之處十方諸佛及眾菩薩悉皆來集擁護是經令無障難若復有人於此經典書寫莊嚴護淨轉讀如造佛像種種嚴飾所獲功德而無有異若復有人供養諸佛精心離慢獲吉祥福息除災難若有受持書寫此經恒離懈怠所獲功德亦復如是一切聖賢常恒擁護離諸災患爾時世尊說是經已四大天王龍神八部阿蘇囉等及諸人天一切大眾聞法歡喜信受奉行
